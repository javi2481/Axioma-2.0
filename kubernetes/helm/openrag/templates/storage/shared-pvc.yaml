{{- if and .Values.backend.persistence.shared.enabled (or .Values.backend.enabled .Values.langflow.enabled) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "openrag.fullname" . }}-shared
  namespace: {{ include "openrag.namespace" . }}
  labels:
    {{- include "openrag.backend.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.backend.persistence.shared.accessMode }}
  {{- if .Values.backend.persistence.shared.storageClass }}
  storageClassName: {{ .Values.backend.persistence.shared.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.backend.persistence.shared.size }}
{{- end }}
